version: "3.9"

# VCM Production Docker Compose
# Set VCM_VERSION to pin a specific release:
#   VCM_VERSION=1.3.4-beta docker compose up -d

name: vcm

services:

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: vcm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vcm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vcm_change_me}
      POSTGRES_DB: vcm_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - vcm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vcm -d vcm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vcm_net

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vcm-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - vcm_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - vcm_net

  # ── Backend ────────────────────────────────────────────
  backend:
    image: ghcr.io/davoudteimouri/vsphere-compliance-manager/backend:${VCM_VERSION:-1.3.4-beta}
    container_name: vcm-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://vcm:${POSTGRES_PASSWORD:-vcm_change_me}@postgres:5432/vcm_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - vcm_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - vcm_net

  # ── Frontend ───────────────────────────────────────────
  frontend:
    image: ghcr.io/davoudteimouri/vsphere-compliance-manager/frontend:${VCM_VERSION:-1.3.4-beta}
    container_name: vcm-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vcm_net

# ── Volumes ────────────────────────────────────────────────
volumes:
  vcm_pgdata:
    name: vcm_pgdata
    driver: local
  vcm_redis:
    name: vcm_redis
    driver: local
  vcm_uploads:
    name: vcm_uploads
    driver: local

# ── Networks ───────────────────────────────────────────────
networks:
  vcm_net:
    name: vcm_net
    driver: bridge
