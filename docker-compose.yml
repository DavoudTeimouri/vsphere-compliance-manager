version: "3.9"

# Production Docker Compose
# Set VCM_VERSION to pin a specific release, e.g.:
#   VCM_VERSION=1.3.3-beta docker compose up -d

name: vcm

services:

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vcm
      POSTGRES_PASSWORD: vcm_pass
      POSTGRES_DB: vcm_db
    volumes:
      - vcm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vcm -d vcm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vcm_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - vcm_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - vcm_net

  backend:
    image: ghcr.io/davoudteimouri/vsphere-compliance-manager/backend:${VCM_VERSION:-1.3.3-beta}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://vcm:vcm_pass@postgres:5432/vcm_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - vcm_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - vcm_net

  frontend:
    image: ghcr.io/davoudteimouri/vsphere-compliance-manager/frontend:${VCM_VERSION:-1.3.3-beta}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vcm_net

volumes:
  vcm_pgdata:
    name: vcm_pgdata
  vcm_redis:
    name: vcm_redis
  vcm_uploads:
    name: vcm_uploads

networks:
  vcm_net:
    name: vcm_net
    driver: bridge
