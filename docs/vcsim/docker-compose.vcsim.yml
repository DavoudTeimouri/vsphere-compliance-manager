version: "3.9"

# VCM Test Environment
# Mirrors production structure: StatefulSets replaced by named volumes.
# Uses pre-built GHCR images — no build step required.
#
# Usage:
#   VCM_VERSION=1.3.4-beta docker compose -f docker-compose.vcsim.yml up -d
#   docker compose -f docker-compose.vcsim.yml logs -f backend
#   docker compose -f docker-compose.vcsim.yml down -v

name: vcm-test

services:

  # ── vCenter Simulator ──────────────────────────────────
  vcsim:
    image: vmware/vcsim:latest
    container_name: vcm-vcsim
    restart: unless-stopped
    command: >
      -l :8989
      -dc 2
      -cluster 3
      -host 4
      -vm 5
      -ds 4
      -pod 2
    ports:
      - "8989:8989"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://localhost:8989/sdk || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - vcm-test-net

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: vcm-test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vcm
      POSTGRES_PASSWORD: vcm_test_pass
      POSTGRES_DB: vcm_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - vcm_test_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vcm -d vcm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vcm-test-net

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vcm-test-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - vcm_test_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - vcm-test-net

  # ── VCM Backend ────────────────────────────────────────
  backend:
    image: ghcr.io/davoudteimouri/vsphere-compliance-manager/backend:${VCM_VERSION:-1.3.4-beta}
    container_name: vcm-test-backend
    restart: unless-stopped
    environment:
      APP_ENV: development
      LOG_LEVEL: DEBUG
      LOG_FORMAT: json
      SECRET_KEY: test-secret-key-not-for-production-use
      ENCRYPTION_KEY: ""
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: VCM@admin2024!
      ADMIN_EMAIL: admin@test.local
      DATABASE_URL: postgresql://vcm:vcm_test_pass@postgres:5432/vcm_db
      REDIS_URL: redis://redis:6379/0
      LDAP_ENABLED: "false"
      ANALYSIS_SCHEDULE_CRON: "0 2 * * *"
      UPLOAD_PATH: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - vcm_test_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - vcm-test-net

  # ── VCM Frontend ───────────────────────────────────────
  frontend:
    image: ghcr.io/davoudteimouri/vsphere-compliance-manager/frontend:${VCM_VERSION:-1.3.4-beta}
    container_name: vcm-test-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vcm-test-net

# ── Volumes ────────────────────────────────────────────────
volumes:
  vcm_test_pgdata:
    name: vcm_test_pgdata
    driver: local
  vcm_test_redis:
    name: vcm_test_redis
    driver: local
  vcm_test_uploads:
    name: vcm_test_uploads
    driver: local

# ── Networks ───────────────────────────────────────────────
networks:
  vcm-test-net:
    name: vcm-test-net
    driver: bridge
