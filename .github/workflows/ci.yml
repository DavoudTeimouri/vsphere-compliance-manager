name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:

  # ────────────────────────────────────────────────────────
  # BACKEND
  # ────────────────────────────────────────────────────────

  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy black
      - run: ruff check . || true
      - run: black --check . || true
      - run: mypy app/ --ignore-missing-imports || true

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: vcm
          POSTGRES_PASSWORD: vcm_pass
          POSTGRES_DB: vcm_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://vcm:vcm_pass@localhost:5432/vcm_test
          SECRET_KEY: ci-test-secret-key-32chars-padding
          REDIS_URL: redis://localhost:6379/0
          LDAP_ENABLED: "false"
        run: alembic upgrade head
      - name: Unit tests
        env:
          DATABASE_URL: postgresql://vcm:vcm_pass@localhost:5432/vcm_test
          SECRET_KEY: ci-test-secret-key-32chars-padding
          REDIS_URL: redis://localhost:6379/0
          LDAP_ENABLED: "false"
        run: pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=term-missing
      - name: Integration tests
        env:
          DATABASE_URL: postgresql://vcm:vcm_pass@localhost:5432/vcm_test
          SECRET_KEY: ci-test-secret-key-32chars-padding
          REDIS_URL: redis://localhost:6379/0
          LDAP_ENABLED: "false"
        run: pytest tests/integration/ -v --cov=app --cov-append --cov-report=xml

  # ────────────────────────────────────────────────────────
  # FRONTEND
  # ────────────────────────────────────────────────────────

  frontend-lint:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run lint || true
      - run: npm run type-check || true

  frontend-test:
    name: Frontend — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run test:coverage || true

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: "http://localhost:8000"
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ────────────────────────────────────────────────────────
  # DOCKER — builds on push to main/develop
  # Packages appear under repository automatically when
  # image name matches ghcr.io/OWNER/REPO/...
  # ────────────────────────────────────────────────────────

  docker-build:
    name: Docker — Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Backend — metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend
          # org.opencontainers.image labels link the package to this repo
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=VCM Backend — vSphere Compliance Manager
            org.opencontainers.image.licenses=MIT
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Backend — Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend — metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=VCM Frontend — vSphere Compliance Manager
            org.opencontainers.image.licenses=MIT
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Frontend — Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: VITE_API_BASE_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Job summary
        run: |
          echo "## 🐳 Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | \`${{ steps.meta-backend.outputs.tags }}\`  |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${{ steps.meta-frontend.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Packages:** https://github.com/${{ github.repository }}/pkgs/container/vsphere-compliance-manager%2Fbackend" >> $GITHUB_STEP_SUMMARY
