name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ── Backend ──────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy black
      - run: ruff check . || true
      - run: black --check . || true
      - run: mypy app/ --ignore-missing-imports || true

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: vcm
          POSTGRES_PASSWORD: vcm_pass
          POSTGRES_DB: vcm_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://vcm:vcm_pass@localhost:5432/vcm_test
          SECRET_KEY: ci-test-secret-key-32chars-padding
          REDIS_URL: redis://localhost:6379/0
          LDAP_ENABLED: "false"
        run: alembic upgrade head
      - name: Unit tests
        env:
          DATABASE_URL: postgresql://vcm:vcm_pass@localhost:5432/vcm_test
          SECRET_KEY: ci-test-secret-key-32chars-padding
          REDIS_URL: redis://localhost:6379/0
          LDAP_ENABLED: "false"
        run: pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=term-missing
      - name: Integration tests
        env:
          DATABASE_URL: postgresql://vcm:vcm_pass@localhost:5432/vcm_test
          SECRET_KEY: ci-test-secret-key-32chars-padding
          REDIS_URL: redis://localhost:6379/0
          LDAP_ENABLED: "false"
        run: pytest tests/integration/ -v --cov=app --cov-append --cov-report=xml

  # ── Frontend ─────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run lint || true
      - run: npm run type-check || true

  frontend-test:
    name: Frontend — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run test:coverage || true

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: "http://localhost:8000"
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # NOTE: Docker images are built ONLY by the Release workflow (release.yml)
  # triggered on git tag push (v*.*.*). CI does NOT build or push images
  # to avoid polluting GHCR with unversioned :main tags.
