name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:

  # ────────────────────────────────────────────────────────
  # BACKEND
  # ────────────────────────────────────────────────────────

  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 Node24

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0 Node24
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install ruff mypy black

      - name: Ruff
        run: ruff check . || true

      - name: Black
        run: black --check . || true

      - name: Mypy
        run: mypy app/ --ignore-missing-imports || true

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: vcm
          POSTGRES_PASSWORD: vcm_pass
          POSTGRES_DB: vcm_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 Node24

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0 Node24
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://vcm:vcm_pass@localhost:5432/vcm_test
          SECRET_KEY: ci-test-secret-key-32chars-padding
          REDIS_URL: redis://localhost:6379/0
          LDAP_ENABLED: "false"
        run: alembic upgrade head

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://vcm:vcm_pass@localhost:5432/vcm_test
          SECRET_KEY: ci-test-secret-key-32chars-padding
          REDIS_URL: redis://localhost:6379/0
          LDAP_ENABLED: "false"
        run: |
          pytest tests/unit/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://vcm:vcm_pass@localhost:5432/vcm_test
          SECRET_KEY: ci-test-secret-key-32chars-padding
          REDIS_URL: redis://localhost:6379/0
          LDAP_ENABLED: "false"
        run: |
          pytest tests/integration/ -v \
            --cov=app \
            --cov-append \
            --cov-report=xml

  # ────────────────────────────────────────────────────────
  # FRONTEND
  # ────────────────────────────────────────────────────────

  frontend-lint:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 Node24

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0 Node24
        with:
          node-version: "22"

      - run: npm install
      - run: npm run lint || true
      - run: npm run type-check || true

  frontend-test:
    name: Frontend — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 Node24

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0 Node24
        with:
          node-version: "22"

      - run: npm install
      - run: npm run test:coverage || true

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 Node24

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0 Node24
        with:
          node-version: "22"

      - run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: "http://localhost:8000"

      - name: Upload artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fcc89b82e4b5e9c9a47  # v4.6.0 Node24
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ────────────────────────────────────────────────────────
  # DOCKER
  # ────────────────────────────────────────────────────────

  docker-build:
    name: Docker — Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 Node24

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0 Node24
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca  # v3.9.0 Node24

      - name: Backend — metadata
        id: meta-backend
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96  # v5.6.1 Node24
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Backend — Build & push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v6.14.0 Node24
        with:
          context: ./backend
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend — metadata
        id: meta-frontend
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96  # v5.6.1 Node24
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Frontend — Build & push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v6.14.0 Node24
        with:
          context: ./frontend
          target: production
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: VITE_API_BASE_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max
