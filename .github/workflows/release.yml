name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:

  docker-release:
    name: Docker — Build & Push Release Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 Node24

      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0 Node24
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca  # v3.9.0 Node24

      - name: Backend — metadata
        id: meta-backend
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96  # v5.6.1 Node24
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Backend — Build & push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v6.14.0 Node24
        with:
          context: ./backend
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend — metadata
        id: meta-frontend
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96  # v5.6.1 Node24
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Frontend — Build & push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v6.14.0 Node24
        with:
          context: ./frontend
          target: production
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          build-args: VITE_API_BASE_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: GitHub — Create Release
    runs-on: ubuntu-latest
    needs: docker-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 Node24
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract CHANGELOG notes
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1;next}/^## \[/{flag=0}flag" CHANGELOG.md \
                  | sed '/^---$/d' | sed '/^[[:space:]]*$/d')
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2.2.1 Node24
        with:
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.notes }}

            ## Docker Images

            ```bash
            docker pull ghcr.io/${{ github.repository }}/backend:${{ steps.version.outputs.version }}
            docker pull ghcr.io/${{ github.repository }}/frontend:${{ steps.version.outputs.version }}
            ```

            ## Quick Start

            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd vsphere-compliance-manager
            cp .env.example .env
            docker compose up -d
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
