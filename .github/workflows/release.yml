name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:

  # ── Build Docker images ────────────────────────────────
  docker:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Backend — metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=VCM Backend — vSphere Compliance Manager
            org.opencontainers.image.licenses=MIT
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Backend — Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend — metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=VCM Frontend — vSphere Compliance Manager
            org.opencontainers.image.licenses=MIT
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Frontend — Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: VITE_API_BASE_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Package release assets ────────────────────────────
  package:
    name: Package — Release Assets
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "version=${{ needs.docker.outputs.version }}" >> $GITHUB_OUTPUT

      # Docker Compose bundle (platform-independent)
      - name: Create deployment bundle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE="vcm-deployment-$VERSION"
          mkdir -p "$BUNDLE"

          # Override image tags to this specific version
          sed "s|:main|:$VERSION|g" docs/vcsim/docker-compose.vcsim.yml \
            | sed "s|\${BACKEND_TAG:-main}|$VERSION|g" \
            | sed "s|\${FRONTEND_TAG:-main}|$VERSION|g" \
            > "$BUNDLE/docker-compose.yml"

          cp .env.example "$BUNDLE/.env.example"
          cp docs/vcsim/seed_vcsim.py "$BUNDLE/seed_vcsim.py"
          cp docs/deployment/README.md "$BUNDLE/README.md"

          cat > "$BUNDLE/QUICKSTART.md" << QUICKSTART
          # VCM $VERSION — Quick Start

          ## Prerequisites
          - Docker 24+ and Docker Compose v2
          - Python 3.8+ with pyVmomi (for seed_vcsim.py)

          ## Start
          \`\`\`bash
          cp .env.example .env
          # Edit .env — set SECRET_KEY and ADMIN_PASSWORD at minimum
          docker compose up -d
          \`\`\`

          UI: http://localhost:3000 (admin / VCM@admin2024!)
          API docs: http://localhost:8000/docs

          ## Docker Images
          \`\`\`bash
          docker pull ghcr.io/davoudteimouri/vsphere-compliance-manager/backend:$VERSION
          docker pull ghcr.io/davoudteimouri/vsphere-compliance-manager/frontend:$VERSION
          \`\`\`

          ## Test with vcsim (no real vCenter needed)
          \`\`\`bash
          pip install pyVmomi
          python3 seed_vcsim.py --seed 42
          \`\`\`
          QUICKSTART

          zip -r "vcm-deployment-$VERSION.zip" "$BUNDLE/"
          tar czf "vcm-deployment-$VERSION.tar.gz" "$BUNDLE/"

      # vcsim testing bundle
      - name: Create vcsim test bundle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE="vcm-vcsim-test-$VERSION"
          mkdir -p "$BUNDLE"

          sed "s|:main|:$VERSION|g" docs/vcsim/docker-compose.vcsim.yml \
            | sed "s|\${BACKEND_TAG:-main}|$VERSION|g" \
            | sed "s|\${FRONTEND_TAG:-main}|$VERSION|g" \
            > "$BUNDLE/docker-compose.yml"

          cp docs/vcsim/seed_vcsim.py "$BUNDLE/seed_vcsim.py"
          cp docs/vcsim/README.md "$BUNDLE/README.md"

          zip -r "vcm-vcsim-test-$VERSION.zip" "$BUNDLE/"

      - name: Upload assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            vcm-deployment-*.zip
            vcm-deployment-*.tar.gz
            vcm-vcsim-test-*.zip

  # ── Create GitHub Release ─────────────────────────────
  release:
    name: GitHub — Create Release
    runs-on: ubuntu-latest
    needs: [docker, package]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets

      - name: Extract CHANGELOG notes
        id: changelog
        run: |
          VERSION="${{ needs.docker.outputs.version }}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1;next}/^## \[/{flag=0}flag" CHANGELOG.md \
                  | sed '/^---$/d' | sed '/^[[:space:]]*$/d')
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ needs.docker.outputs.version }}"
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
          files: |
            vcm-deployment-*.zip
            vcm-deployment-*.tar.gz
            vcm-vcsim-test-*.zip
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.notes }}

            ---

            ## Installation

            ### Option A — Docker Compose (quickest)

            Download `vcm-deployment-${{ needs.docker.outputs.version }}.zip`, extract, then:

            ```bash
            cp .env.example .env
            # Edit .env — set SECRET_KEY and ADMIN_PASSWORD
            docker compose up -d
            ```

            ### Option B — Pull images manually

            ```bash
            docker pull ghcr.io/davoudteimouri/vsphere-compliance-manager/backend:${{ needs.docker.outputs.version }}
            docker pull ghcr.io/davoudteimouri/vsphere-compliance-manager/frontend:${{ needs.docker.outputs.version }}
            ```

            Images: [GHCR Backend](https://github.com/${{ github.repository }}/pkgs/container/vsphere-compliance-manager%2Fbackend) · [GHCR Frontend](https://github.com/${{ github.repository }}/pkgs/container/vsphere-compliance-manager%2Ffrontend)

            ### Option C — Test without a real vCenter

            Download `vcm-vcsim-test-${{ needs.docker.outputs.version }}.zip`, extract, then:

            ```bash
            docker compose up -d
            pip install pyVmomi
            python3 seed_vcsim.py --seed 42
            ```

            ---

            ## Compatibility

            | Component | Version |
            |-----------|---------|
            | vCenter Server | 6.0 – 8.0 |
            | Docker | 24+ |
            | Docker Compose | v2+ |
            | Kubernetes | 1.26+ |
            | Python (seed script) | 3.8+ |

            ---

            ## Documentation

            - [Deployment Guide](https://github.com/${{ github.repository }}/blob/main/docs/deployment/README.md)
            - [vcsim Testing Guide](https://github.com/${{ github.repository }}/blob/main/docs/vcsim/README.md)
            - [API Reference](https://github.com/${{ github.repository }}/blob/main/docs/api/README.md)
            - [Architecture](https://github.com/${{ github.repository }}/blob/main/docs/architecture/README.md)
