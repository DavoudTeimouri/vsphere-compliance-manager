apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

# Production overrides
patches:
  # Scale backend to 3 replicas
  - target:
      kind: Deployment
      name: vcm-backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3

  # Scale frontend to 2 replicas
  - target:
      kind: Deployment
      name: vcm-frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

  # Set production hostname in Ingress
  - target:
      kind: Ingress
      name: vcm-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: vcm.your-domain.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: vcm.your-domain.com
      - op: replace
        path: /spec/tls/0/secretName
        value: vcm-tls-secret

  # Increase postgres storage for production
  - target:
      kind: StatefulSet
      name: vcm-postgres
    patch: |-
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 50Gi

  # Set StorageClass for production PVCs
  - target:
      kind: PersistentVolumeClaim
      name: vcm-uploads
    patch: |-
      - op: replace
        path: /spec/storageClassName
        value: nfs-client

# Pin to specific release — update this on every upgrade
images:
  - name: ghcr.io/davoudteimouri/vsphere-compliance-manager/backend
    newTag: "1.3.3-beta"
  - name: ghcr.io/davoudteimouri/vsphere-compliance-manager/frontend
    newTag: "1.3.3-beta"
