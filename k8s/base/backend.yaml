# ── Backend Deployment ────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcm-backend
  namespace: vcm
  labels:
    app: vcm-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: vsphere-compliance-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vcm-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: vcm-backend
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: vcm-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        # Wait for postgres before starting
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c',
            'until nc -z vcm-postgres 5432; do echo "Waiting for postgres..."; sleep 2; done']
      containers:
        - name: backend
          image: ghcr.io/davoudteimouri/vsphere-compliance-manager/backend:${VCM_VERSION}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - secretRef:
                name: vcm-secrets
            - configMapRef:
                name: vcm-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: vcm-uploads

---
# ── Backend Service ───────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: vcm-backend
  namespace: vcm
  labels:
    app: vcm-backend
    app.kubernetes.io/component: backend
spec:
  selector:
    app: vcm-backend
  ports:
    - port: 8000
      targetPort: 8000
      name: http
      protocol: TCP
  type: ClusterIP

---
# ── Backend ServiceAccount ────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vcm-backend
  namespace: vcm
  labels:
    app.kubernetes.io/component: backend

---
# ── HorizontalPodAutoscaler ───────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vcm-backend
  namespace: vcm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vcm-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
