apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcm-backend
  namespace: vcm
  labels:
    app: vcm-backend
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vcm-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: vcm-backend
    spec:
      serviceAccountName: vcm-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: ghcr.io/davoudteimouri/vsphere-compliance-manager/backend:
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: vcm-secrets
            - configMapRef:
                name: vcm-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: vcm-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: vcm-backend
  namespace: vcm
spec:
  selector:
    app: vcm-backend
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vcm-backend
  namespace: vcm
