# ── Secrets Template ────────────────────────────────────
# DO NOT apply this file directly.
# Create the secret using kubectl:
#
#   kubectl create secret generic vcm-secrets \
#     --from-literal=SECRET_KEY="$(openssl rand -base64 32)" \
#     --from-literal=ENCRYPTION_KEY="" \
#     --from-literal=ADMIN_PASSWORD="YourSecurePassword!" \
#     --from-literal=ADMIN_EMAIL="admin@example.com" \
#     -n vcm
#
#   kubectl create secret generic vcm-postgres-secret \
#     --from-literal=POSTGRES_USER=vcm \
#     --from-literal=POSTGRES_PASSWORD="$(openssl rand -base64 24)" \
#     --from-literal=DATABASE_URL="postgresql://vcm:PASSWORD@vcm-postgres:5432/vcm_db" \
#     -n vcm
#
# For production, use Sealed Secrets or Vault:
#   https://github.com/bitnami-labs/sealed-secrets
#   https://www.vaultproject.io/docs/platform/k8s

apiVersion: v1
kind: Secret
metadata:
  name: vcm-secrets
  namespace: vcm
  annotations:
    # Reminder: replace with SealedSecret in production
    kubernetes.io/description: "VCM application secrets — do not commit values"
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_WITH_RANDOM_32_CHAR_STRING"
  ENCRYPTION_KEY: ""
  ADMIN_PASSWORD: "REPLACE_ME"
  ADMIN_EMAIL: "admin@example.com"
  ADMIN_USERNAME: "admin"
  LDAP_BIND_PASSWORD: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: vcm-postgres-secret
  namespace: vcm
type: Opaque
stringData:
  POSTGRES_USER: "vcm"
  POSTGRES_PASSWORD: "REPLACE_ME"
  DATABASE_URL: "postgresql://vcm:REPLACE_ME@vcm-postgres:5432/vcm_db"
