apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcm-frontend
  namespace: vcm
  labels:
    app: vcm-frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vcm-frontend
  template:
    metadata:
      labels:
        app: vcm-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/DavoudTeimouri/vsphere-compliance-manager/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: vcm-frontend
  namespace: vcm
spec:
  selector:
    app: vcm-frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vcm-ingress
  namespace: vcm
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: vcm.example.com          # Override in overlay
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: vcm-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vcm-frontend
                port:
                  number: 80
  tls:
    - hosts:
        - vcm.example.com
      secretName: vcm-tls
