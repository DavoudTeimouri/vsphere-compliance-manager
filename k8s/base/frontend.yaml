# ── Frontend Deployment ───────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcm-frontend
  namespace: vcm
  labels:
    app: vcm-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: vsphere-compliance-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vcm-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: vcm-frontend
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/davoudteimouri/vsphere-compliance-manager/frontend:${VCM_VERSION}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

---
# ── Frontend Service ──────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: vcm-frontend
  namespace: vcm
  labels:
    app: vcm-frontend
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: vcm-frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
      protocol: TCP
  type: ClusterIP

---
# ── Ingress ───────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vcm-ingress
  namespace: vcm
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: vcm.example.com    # Override in overlay
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: vcm-backend
                port:
                  number: 8000
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: vcm-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vcm-frontend
                port:
                  number: 80
  tls:
    - hosts:
        - vcm.example.com
      secretName: vcm-tls-secret
